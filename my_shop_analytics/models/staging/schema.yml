version: 2

models:
  - name: stg_orders
    description: "Cleaned and standardized orders from raw source"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: order_status
        tests:
          - accepted_values:
              values: ['completed', 'returned', 'pending']

  - name: stg_customers
    description: "Cleaned and standardized customers"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: email
        tests:
          - unique
          - not_null